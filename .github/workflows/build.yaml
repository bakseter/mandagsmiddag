name: Build images

on:
  push:
    branches: [master]
    paths-ignore:
      - 'manifests/**'
      - 'README.md'
  pull_request:
    branches: [master]
    paths-ignore:
      - 'manifests/**'
      - 'README.md'
  schedule:
    - cron: '3 4 * * *'

jobs:
  build:
    name: 'Build ${{ matrix.image-name }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image-name:
          - backend
          - frontend
    permissions:
      actions: read
      contents: read
      security-events: write
      packages: write
    env:
      IMAGE_NAME: 'ghcr.io/${{ github.repository }}/${{ matrix.image-name }}'
      TRIVY_SARIF: 'trivy-results.sarif'
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: 'ghcr.io'
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image with cache and push to registry
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          push: 'true'
          build-args: 'VITE_BACKEND_URL=https://mandagsmiddag.no/api'
          tags: "${{ env.IMAGE_NAME }}:${{ github.sha }}${{ ((github.event_name == 'push' || github.event_name == 'schedule') && github.ref == 'refs/heads/master') && format(',{0}:latest', env.IMAGE_NAME) || '' }}"
          cache-from: 'type=registry,ref=${{ env.IMAGE_NAME }}:latest'
          cache-to: 'type=inline'
          context: '${{ matrix.image-name }}'
