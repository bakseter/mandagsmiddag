apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mandagsmiddag-backend
  namespace: mandagsmiddag
spec:
  parentRefs:
    - name: cloudflared-gateway
      namespace: cloudflared
      group: gateway.networking.k8s.io
      kind: Gateway

  hostnames:
    - mandagsmiddag.no

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api

      backendRefs:
        - name: mandagsmiddag-backend
          port: 8080
          group: '' # for argocd diff
          kind: Service # for argocd diff
          weight: 1 # for argocd diff
