apiVersion: apps/v1
kind: Deployment
metadata:
  name: mandagsmiddag-backend
  namespace: mandagsmiddag
  annotations:
    keel.sh/match-tag: 'true'
    keel.sh/policy: force
    keel.sh/trigger: poll
spec:
  replicas: 2
  revisionHistoryLimit: 5
  template:
    metadata:
      labels:
        logs.bakseter.net/scrape: 'false'
    spec:
      containers:
        - name: mandagsmiddag-backend
          image: ghcr.io/bakseter/mandagsmiddag/backend:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: HOST
              value: https://api.mandagsmiddag.bakseter.net
            - name: GIN_MODE
              value: release
            - name: DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: mandagsmiddag-database-app
                  key: host
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mandagsmiddag-database-app
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mandagsmiddag-database-app
                  key: password
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: mandagsmiddag-database-app
                  key: dbname
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://alloy.monitoring.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OIDC_ISSUER
              value: https://authentik.bakseter.no/application/o/five31/
            - name: OIDC_CLIENT_ID
              value: mandagsmiddag
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - mandagsmiddag-backend
              topologyKey: bakseter.net/physical-node
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        runAsGroup: 65534
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
        supplementalGroups:
          - 65534
