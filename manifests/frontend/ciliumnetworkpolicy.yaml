apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: mandagsmiddag-frontend
  namespace: mandagsmiddag
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: mandagsmiddag-frontend

  ingress:
    # Allow ingress from Envoy Gateway
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: envoy-gateway-system
            gateway.envoyproxy.io/owning-gateway-name: cloudflared-gateway
      toPorts:
        - ports:
            - port: '3000'
              protocol: TCP

  egress: [] # no egress allowed
