apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: mandagsmiddag-frontend
  namespace: mandagsmiddag
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: mandagsmiddag-frontend

  ingress:
    # Allow ingress from Envoy Gateway
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: envoy-gateway-system
            gateway.envoyproxy.io/owning-gateway-name: cloudflared-gateway
      toPorts:
        - ports:
            - port: '3000'
              protocol: TCP

  egress:
    # Allow DNS lookup for Alloy
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: '53'
              protocol: ANY
          rules:
            dns:
              - matchName: 'alloy.monitoring.svc.cluster.local'

    # Allow sending telemetry via OTLP to Grafana Alloy
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: alloy
      toPorts:
        - ports:
            - port: '4317'
              protocol: TCP
