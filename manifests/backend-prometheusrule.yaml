apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: mandagsmiddag-backend
  namespace: mandagsmiddag
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: mandagsmiddag-backend
      rules:
        - alert: BackendHighErrorRate
          expr: sum(rate(http_requests_received_total{service_namespace="mandagsmiddag",code=~"5.."}[5m])) > 0.05
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: '5xx error rate above 0.05 req/s'

        - alert: BackendHighLatency
          expr: histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{service_namespace="mandagsmiddag"}[5m]))) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: 'p95 latency above 1s ({{ $value | humanizeDuration }})'

        - alert: BackendDown
          expr: sum(up{service_namespace="mandagsmiddag"}) == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: 'No backend pods are up'
