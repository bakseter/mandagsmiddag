apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend
  namespace: mandagsmiddag
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: public
      group: gateway.networking.k8s.io # for argocd diff
      kind: Gateway

  hostnames:
    - mandagsmiddag.no

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: backend
          port: 8080
          group: '' # for argocd diff
          kind: Service # for argocd diff
          weight: 1 # for argocd diff
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: authentik
