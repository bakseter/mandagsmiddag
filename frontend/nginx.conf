load_module modules/ngx_otel_module.so;

worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /tmp/nginx/nginx.pid;

events {
    worker_connections  1024;
}

http {
    proxy_temp_path /tmp/nginx/proxy_temp;
    client_body_temp_path /tmp/nginx/client_temp;
    fastcgi_temp_path /tmp/nginx/fastcgi_temp;
    uwsgi_temp_path /tmp/nginx/uwsgi_temp;
    scgi_temp_path /tmp/nginx/scgi_temp;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"user_agent":"$http_user_agent",'
        '"trace_id":"$otel_trace_id",'
        '"span_id":"$otel_span_id",'
        '"parent_sampled":"$otel_parent_sampled"}';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;

    keepalive_timeout  65;

    otel_exporter {
        endpoint alloy.monitoring.svc.cluster.local:4317;
        interval 5s;
        batch_size 512;
        batch_count 4;
    }

    otel_service_name mandagsmiddag-frontend;

    otel_resource_attr service.namespace mandagsmiddag;
    otel_resource_attr deployment.environment.name production;
    otel_resource_attr k8s.cluster.name homelab;

    server {
        listen       3000;
        server_name  localhost;

        root   /usr/share/nginx/html;
        index  index.html;

        otel_trace $otel_parent_sampled;
        otel_trace_context propagate;

        otel_spane_name "$request_method $uri";

        location / {
            try_files $uri $uri/ /index.html;

            # Security headers
            add_header X-Content-Type-Options nosniff;
            add_header X-Frame-Options DENY;
            add_header X-XSS-Protection "1; mode=block";

            # Content Security Policy
            # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.cloudflare.com; connect-src 'self' https://mandagsmiddag.no; img-src 'self' data:; font-src 'self'; frame-src 'self' https://authentik.bakseter.no;" always;
        }

        # No logs/traces for static assets
        location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|map)$ {
            otel_trace off;
            access_log off;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
