load_module modules/ngx_otel_module.so;

worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /tmp/nginx/nginx.pid;

events {
    worker_connections  1024;
}

http {
    proxy_temp_path /tmp/nginx/proxy_temp;
    client_body_temp_path /tmp/nginx/client_temp;
    fastcgi_temp_path /tmp/nginx/fastcgi_temp;
    uwsgi_temp_path /tmp/nginx/uwsgi_temp;
    scgi_temp_path /tmp/nginx/scgi_temp;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"trace_id":"$otel_trace_id",'
        '"span_id":"$otel_span_id"}';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;

    keepalive_timeout  65;

    otel_exporter {
        endpoint http://alloy.monitoring.svc.cluster.local:4317;
    }
    otel_service_name mandagsmiddag-frontend;
    otel_trace on;
    otel_trace_context propagate;

    server {
        listen       3000;
        server_name  localhost;

        root   /usr/share/nginx/html;
        index  index.html;

        location / {
            try_files $uri $uri/ /index.html;

            # Security headers
            add_header X-Content-Type-Options nosniff;
            add_header X-Frame-Options DENY;
            add_header X-XSS-Protection "1; mode=block";

            # Content Security Policy
            # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.cloudflare.com; connect-src 'self' https://mandagsmiddag.no; img-src 'self' data:; font-src 'self'; frame-src 'self' https://authentik.bakseter.no;" always;
        }
    }
}
